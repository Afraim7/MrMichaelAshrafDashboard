name: Deploy Flutter Web

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          # Pinned to match local dev. Floating 'stable' drifted to 3.44.2,
          # where IconData became a final class and broke font_awesome_flutter
          # 10.x. Bump this (and the package to v11) together in a planned PR.
          flutter-version: '3.41.0'
          channel: 'stable'

      - name: Enable Web
        run: flutter config --enable-web

      - name: Build Web App
        run: flutter build web --release

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages   # deployment branch
          folder: build/web  # built web output
